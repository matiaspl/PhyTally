[platformio]
default_envs = tally_tx

[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    fastled/FastLED @ ^3.6.0

[env:tally_tx]
build_src_filter = +<tx/> -<rx/>
board_build.filesystem = littlefs
lib_deps =
    ${env.lib_deps}
    bblanchon/ArduinoJson @ ^7.0.4
    esphome/ESPAsyncWebServer-esphome @ ^3.1.0
build_flags =
    -DPHYTALLY_ENABLE_ESPNOW=1
    -Iinclude

[env:tally_tx_esp32s3]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-s3-devkitc-1
build_src_filter = +<tx/> -<rx/> -<rx_esp32c6/> -<rx8266/>
board_build.filesystem = littlefs
board_build.usb_mode = 0
board_build.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_opi
board_build.psram_type = opi
board_upload.flash_size = 16MB
lib_deps =
    ${env.lib_deps}
    bblanchon/ArduinoJson @ ^7.0.4
    esphome/ESPAsyncWebServer-esphome @ ^3.1.0
build_flags =
    -DBOARD_HAS_PSRAM
    -DCONFIG_TINYUSB_CUSTOM_CLASS_ENABLED=1
    -DCONFIG_TINYUSB_NCM_ENABLED=1
    -DCFG_TUD_NCM_IN_NTB_N=3
    -DCFG_TUD_NCM_IN_NTB_MAX_SIZE=8192
    -DCFG_TUD_NCM_OUT_NTB_MAX_SIZE=8192
    -DPHYTALLY_NEOPIXEL_PIN=48
    -DPHYTALLY_HAS_STATUS_LED=0
    -DPHYTALLY_ENABLE_ESPNOW=1
    -DPHYTALLY_USE_USB_NCM_BACKHAUL=1
    -Iinclude

[env:tally_tx_esp32s3_espnow_proto]
extends = env:tally_tx_esp32s3
build_flags =
    ${env:tally_tx_esp32s3.build_flags}
    -DPHYTALLY_FORCE_ESPNOW=1

[env:tally_rx]
build_src_filter = +<rx/> -<tx/>
lib_deps =
    ${env.lib_deps}
    # Add display libraries here if needed later (e.g., TFT_eSPI)

[env:tally_rx_esp32s3]
board = esp32-s3-devkitc-1
build_src_filter = +<rx/> -<tx/>
board_build.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_opi
board_build.psram_type = opi
board_upload.flash_size = 16MB
lib_deps =
    ${env.lib_deps}
build_flags =
    -DBOARD_HAS_PSRAM
    -DPHYTALLY_NEOPIXEL_PIN=48
    -DPHYTALLY_HAS_STATUS_LED=0
    -DPHYTALLY_ENABLE_ESPNOW=1

[env:tally_rx_esp32s3_espnow_proto]
extends = env:tally_rx_esp32s3
build_flags =
    ${env:tally_rx_esp32s3.build_flags}
    -DPHYTALLY_FORCE_ESPNOW=1

[env:tally_rx_esp8266]
platform = espressif8266
board = esp12e
framework = arduino
monitor_speed = 115200
build_src_filter = +<rx8266/> -<tx/> -<rx/>
lib_deps =

[env:tally_rx_esp32c6]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-c6-devkitm-1
framework = arduino
monitor_speed = 115200
build_src_filter = +<rx_esp32c6/> -<tx/> -<rx/> -<rx8266/>
lib_deps =
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DPHYTALLY_NEOPIXEL_PIN=8
    -DPHYTALLY_ENABLE_ESPNOW=1

[env:tally_rx_esp32c6_espnow_proto]
extends = env:tally_rx_esp32c6
build_flags =
    ${env:tally_rx_esp32c6.build_flags}
    -DPHYTALLY_FORCE_ESPNOW=1
